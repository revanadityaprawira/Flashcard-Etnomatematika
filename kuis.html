<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Operasi Hitung - Flash Card Etnomatematika</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Fredoka -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --warna-biru: #4CC9F0;
            --warna-kuning: #FFD60A;
            --warna-hijau: #4CAF50;
            --warna-oranye: #FF9F1C;
            --warna-merah: #FF4D4D;
            --warna-ungu: #9D4EDD;
            --warna-teks: #2B2D42;
            --warna-bg: #fdfdfd;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0fbff;
            color: var(--warna-teks);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navigasi */
        .navbar-custom {
            background-color: white;
            padding: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-link-custom {
            color: #777;
            text-decoration: none;
            font-weight: 600;
            margin: 0 10px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
            display: inline-block;
        }

        .nav-link-custom:hover {
            background-color: #f0f0f0;
            color: var(--warna-biru);
        }

        .nav-link-custom.active {
            background-color: var(--warna-biru);
            color: white !important;
        }

        /* Layout Kuis */
        .quiz-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .quiz-card {
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border: 8px solid white;
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--warna-ungu);
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .petunjuk {
            background: var(--warna-kuning);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Menu Pilihan Kuis */
        .quiz-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .select-btn {
            background: white;
            border: 4px solid var(--warna-biru);
            padding: 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .select-btn:hover {
            transform: translateY(-5px);
            background: var(--warna-biru);
            color: white;
        }

        /* Soal */
        .question-box {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .q-text {
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option-btn {
            background: #f9f9f9;
            border: 3px solid #eee;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--warna-biru);
            background: #e0f7ff;
        }

        /* Benar / Salah */
        .tf-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-true { background: var(--warna-hijau); color: white; border: none; }
        .btn-false { background: var(--warna-merah); color: white; border: none; }

        /* Isian */
        .input-answer {
            font-size: 2rem;
            text-align: center;
            width: 150px;
            padding: 10px;
            border: 4px solid var(--warna-biru);
            border-radius: 20px;
            margin-bottom: 20px;
            font-family: 'Fredoka', sans-serif;
        }

        .btn-check {
            background: var(--warna-ungu);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Feedback Popups */
        .feedback {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 0 100px rgba(0,0,0,0.2);
            text-align: center;
            border: 8px solid var(--warna-hijau);
            min-width: 300px;
        }

        .feedback.wrong { border-color: var(--warna-merah); }

        /* Progress Bar */
        .progress-container {
            height: 15px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--warna-hijau);
            width: 0%;
            transition: width 0.3s;
        }

        /* Result Area */
        #result-area {
            display: none;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            background: var(--warna-kuning);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
            margin: 20px auto;
            border: 8px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .nav-btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            transition: transform 0.2s;
        }

        .btn-retry { background: var(--warna-oranye); }
        .btn-home { background: var(--warna-biru); }
        .nav-btn:hover { transform: scale(1.05); color: white; }

        /* Ikon SVG sederhana */
        .quiz-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }

        @media (max-width: 576px) {
            h1 { font-size: 1.8rem; }
            .q-text { font-size: 1.4rem; }
            .options-grid { grid-template-columns: 1fr; }
        }

         /* Kontrol Musik */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: white;
            padding: 10px 15px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-btn {
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .btn-on { background-color: var(--warna-hijau); color: white; }
        .btn-off { background-color: #ff4d4d; color: white; }
        .music-btn:hover { transform: scale(1.1); }
        .status-badge { font-size: 0.8rem; font-weight: bold; color: #777; }

    </style>
</head>
<body>
    <!-- Kontrol Musik -->
    <div class="music-control">
        <span class="status-badge" id="musicStatus">MUSIK MATI</span>
        <button onclick="playMusic()" class="music-btn btn-on" title="Nyalakan Musik">🔊</button>
        <button onclick="pauseMusic()" class="music-btn btn-off" title="Matikan Musik">🔇</button>
    </div>

    <!-- Audio Element (Link Musik Bebas Royalti) -->
    <audio id="bgMusic" loop>
        <source src="lagu.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung musik.
    </audio>
    

    <div class="quiz-container">
        <div class="quiz-card" id="main-card">
            
            <!-- Welcome View -->
            <div id="welcome-view">
                <h1>Kuis Operasi Hitung</h1>
                <p class="petunjuk">Pilih kuis yang ingin kamu mainkan!</p>
                
                <div class="quiz-selector">
                    <div class="select-btn" onclick="startQuiz('pg')">
                        <div class="fs-1">📝</div>
                        <div class="fw-bold">Pilihan Ganda</div>
                        <small>Pilih jawaban yang benar</small>
                    </div>
                    <div class="select-btn" onclick="startQuiz('tf')" style="border-color: var(--warna-oranye);">
                        <div class="fs-1">🤔</div>
                        <div class="fw-bold">Benar / Salah</div>
                        <small>Yakin atau tidak ya?</small>
                    </div>
                    <div class="select-btn" onclick="startQuiz('isian')" style="border-color: var(--warna-ungu);">
                        <div class="fs-1">✏️</div>
                        <div class="fw-bold">Isian Singkat</div>
                        <small>Tulis angkanya di sini</small>
                    </div>
                </div>
            </div>

            <!-- Quiz View -->
            <div id="quiz-view" style="display: none;">
                <div class="progress-container">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                <div id="question-container">
                    <!-- Soal akan muncul di sini via JS -->
                </div>
            </div>

            <!-- Result View -->
            <div id="result-area">
                <h2 id="result-title">Selesai!</h2>
                <div class="score-circle" id="final-score">0</div>
                <p id="result-msg" class="fs-5 mb-4"></p>
                <div class="d-flex flex-wrap justify-content-center">
                    <button class="nav-btn btn-retry" onclick="location.reload()">Ulangi Kuis 🔄</button>
                    <a href="index.html" class="nav-btn btn-home">Kembali ke Menu 🏠</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Feedbacks -->
    <div id="fb-correct" class="feedback">
        <h2 style="color: var(--warna-hijau);">Hebat! 🌟</h2>
        <p>Jawabanmu Benar!</p>
        <div class="fs-1">🎉</div>
    </div>

    <div id="fb-wrong" class="feedback wrong">
        <h2 style="color: var(--warna-merah);">Ayo Semangat! 💪</h2>
        <p>Coba teliti lagi ya...</p>
        <div class="fs-1">😊</div>
    </div>

    <script>
        const quizData = {
            pg: [
                { q: "2 + 3 = ...", a: ["4", "5", "6"], c: 1 },
                { q: "10 - 4 = ...", a: ["6", "7", "5"], c: 0 },
                { q: "5 + 5 = ...", a: ["9", "10", "11"], c: 1 },
                { q: "8 - 2 = ...", a: ["5", "6", "4"], c: 1 },
                { q: "1 + 7 = ...", a: ["8", "7", "9"], c: 0 }
            ],
            tf: [
                { q: "3 + 2 = 6", a: false },
                { q: "5 - 1 = 4", a: true },
                { q: "10 + 0 = 10", a: true },
                { q: "7 - 3 = 5", a: false },
                { q: "2 + 2 = 4", a: true }
            ],
            isian: [
                { q: "4 + 4 = ", a: "8" },
                { q: "9 - 3 = ", a: "6" },
                { q: "7 + 2 = ", a: "9" },
                { q: "10 - 5 = ", a: "5" },
                { q: "3 + 6 = ", a: "9" }
            ]
        };

        let currentQuizType = '';
        let currentQuestionIndex = 0;
        let score = 0;

        function startQuiz(type) {
            currentQuizType = type;
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const container = document.getElementById('question-container');
            const data = quizData[currentQuizType][currentQuestionIndex];
            const total = quizData[currentQuizType].length;
            
            // Progress Bar
            document.getElementById('progress-bar').style.width = (currentQuestionIndex / total * 100) + '%';

            let html = `<div class="q-text">${data.q}</div>`;

            if (currentQuizType === 'pg') {
                html += `<div class="options-grid">`;
                data.a.forEach((opt, idx) => {
                    html += `<button class="option-btn" onclick="checkAnswer(${idx})">${opt}</button>`;
                });
                html += `</div>`;
            } else if (currentQuizType === 'tf') {
                html += `<div class="tf-grid">
                    <button class="option-btn btn-true" onclick="checkAnswer(true)">BENAR</button>
                    <button class="option-btn btn-false" onclick="checkAnswer(false)">SALAH</button>
                </div>`;
            } else if (currentQuizType === 'isian') {
                html += `<div>
                    <input type="number" id="input-ans" class="input-answer" placeholder="?">
                    <br>
                    <button class="btn-check" onclick="checkIsian()">Cek Jawaban</button>
                </div>`;
            }

            container.innerHTML = html;
        }

        function checkAnswer(userAns) {
            const data = quizData[currentQuizType][currentQuestionIndex];
            let isCorrect = false;

            if (currentQuizType === 'pg') {
                isCorrect = (userAns === data.c);
            } else if (currentQuizType === 'tf') {
                isCorrect = (userAns === data.a);
            }

            processFeedback(isCorrect);
        }

        function checkIsian() {
            const val = document.getElementById('input-ans').value;
            const data = quizData[currentQuizType][currentQuestionIndex];
            processFeedback(val === data.a);
        }

        function processFeedback(isCorrect) {
            const fbId = isCorrect ? 'fb-correct' : 'fb-wrong';
            const fb = document.getElementById(fbId);
            
            if(isCorrect) score += 20;

            fb.style.display = 'block';
            setTimeout(() => {
                fb.style.display = 'none';
                nextQuestion();
            }, 1500);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData[currentQuizType].length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            let msg = "";
            if(score >= 80) msg = "Luar biasa! Kamu sangat pintar!";
            else if(score >= 60) msg = "Bagus sekali! Terus berlatih ya!";
            else msg = "Jangan menyerah, ayo belajar lagi!";
            
            document.getElementById('result-msg').innerText = msg;
        }
    </script>

       
    <!-- Script Kontrol Musik -->
    <script>
        const music = document.getElementById('bgMusic');
        const statusText = document.getElementById('musicStatus');

        function playMusic() {
            music.play();
            statusText.innerText = "MUSIK AKTIF 🎵";
            statusText.style.color = "#4CAF50";
        }

        function pauseMusic() {
            music.pause();
            statusText.innerText = "MUSIK MATI";
            statusText.style.color = "#ff4d4d";
        }

        // Efek suara hover pada menu (opsional)
        const cards = document.querySelectorAll('.menu-card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                // Bisa ditambahkan sound effect pendek di sini
            });
        });
    </script>
</body>
</html>
