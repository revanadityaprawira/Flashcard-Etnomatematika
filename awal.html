<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Card Digital Etnomatematika</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --warna-biru: #4cc9f0;
        --warna-kuning: #ffd60a;
        --warna-hijau: #4caf50;
        --warna-oranye: #ff9f1c;
        --warna-ungu: #9d4edd;
        --warna-merah: #ef4444;
        --warna-teks: #2b2d42;
      }

      body {
        font-family: "Fredoka", sans-serif;
        /* MURNI MENYAMAKAN WARNA BASE DAN DOT PATTERN SESUAI REFERENSI 1 */
        background-color: #e0f2fe;
        background-image: radial-gradient(#bae6fd 2px, transparent 2px);
        background-size: 30px 30px;
        color: var(--warna-teks);
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        position: relative;
      }

      /* --- LOGIKA ANIMASI MENGAPUNG (MURNI ADAPTASI DARI KODE UTAMA) --- */
      .floating-element {
        display: inline-block;
        position: absolute;
        pointer-events: none;
        user-select: none;
        animation: float 4s ease-in-out infinite;
        z-index: 1;
        font-family: "Nunito", sans-serif;
        font-weight: 900;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      /* MENGGANTI SELEKTOR LOGIKA WARNA TAILWIND MENJADI STANDAR RGBA DENGAN OPACITY TIPIS (10% - 15%) */
      .bg-math-10 {
        color: rgba(59, 130, 246, 0.1);
      }
      .bg-math-15 {
        color: rgba(59, 130, 246, 0.14);
      }
      .bg-trophy-10 {
        color: rgba(234, 179, 8, 0.1);
      }

      /* STANDARISASI UKURAN IKON SEPERTI DI REF INDEX.HTML */
      .text-4xl-custom {
        font-size: 2.25rem;
      }
      .text-5xl-custom {
        font-size: 3rem;
      }
      .text-6xl-custom {
        font-size: 3.75rem;
      }
      .text-7xl-custom {
        font-size: 4.5rem;
      }
      .text-8xl-custom {
        font-size: 6rem;
      }

      /* Container Utama */
      .main-container {
        width: 100%;
        max-width: 1000px;
        padding: 30px 20px;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      /* Header & Judul */
      .header-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 40px;
        box-shadow: 0 15px 0 rgba(0, 0, 0, 0.05);
        margin-bottom: 15px; /* <--- Ganti ke 15px atau 20px agar lebih mepet */
        border: 6px solid white;
        animation: slideDown 0.8s ease-out;
      }

      @keyframes slideDown {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      h1 {
        color: var(--warna-biru);
        font-weight: 600;
        font-size: 2 rem;
        margin-bottom: 5px;
      }

      .subtitle {
        font-size: 1 rem;
        color: #555;
        margin-bottom: 15px;
      }

      .intro-text {
        font-size: 1.2rem;
        background: var(--warna-kuning);
        display: inline-block;
        padding: 8px 25px;
        border-radius: 20px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      /* Kontrol Musik */
      .music-control {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: white;
        padding: 10px 15px;
        border-radius: 50px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .music-btn {
        border: none;
        background: none;
        font-size: 1.2rem;
        cursor: pointer;
      }
      .music-btn:hover {
        transform: scale(1.1);
      }
      .status-badge {
        font-size: 0.7rem;
        font-weight: bold;
      }

      /* Grid Menu Utama - DISETING 2 KOLOM UNTUK DESKTOP */
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-top: 20px;
      }

      .menu-card {
        background: white;
        border-radius: 30px;
        padding: 25px 15px;
        text-decoration: none;
        color: var(--warna-teks);
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 0 rgba(0, 0, 0, 0.05);
        border: 4px solid transparent;
      }

      .menu-card:hover {
        transform: translateY(-10px) scale(1.05);
        color: var(--warna-teks);
      }

      .icon-box {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        font-size: 2.5rem;
      }

      .menu-title {
        font-weight: 600;
        font-size: 1.1rem;
      }

      /* Variasi Warna Menu */
      .materi {
        border-color: var(--warna-biru);
      }
      .materi .icon-box {
        background-color: #e0f2fe;
        color: var(--warna-biru);
      }

      .flashcard {
        border-color: var(--warna-kuning);
      }
      .flashcard .icon-box {
        background-color: #fef9c3;
        color: #b45309;
      }

      .capaian {
        border-color: var(--warna-hijau);
      }
      .capaian .icon-box {
        background-color: #dcfce7;
        color: var(--warna-hijau);
      }

      .petunjuk {
        border-color: var(--warna-merah);
      }
      .petunjuk .icon-box {
        background-color: #fee2e2;
        color: var(--warna-merah);
      }

      /* Ilustrasi SVG */
      .svg-header {
        width: 100px;
        height: auto;
        margin-bottom: 15px;
      }

      @media (max-width: 576px) {
        h1 {
          font-size: 1.8rem;
        }
        .subtitle {
          font-size: 1rem;
        }
        .menu-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px;
        }
        .menu-card {
          padding: 15px 10px;
          border-radius: 20px;
        }
        .icon-box {
          width: 60px;
          height: 60px;
          font-size: 1.8rem;
          margin-bottom: 8px;
        }
        .menu-title {
          font-size: 0.9rem;
        }
        .music-control {
          top: auto;
          bottom: 20px;
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="top: 5%; left: 4%"
    >
      1
    </div>
    <div
      class="floating-element bg-math-15 text-5xl-custom"
      style="top: 15%; left: 12%; animation-delay: 0.4s"
    >
      +
    </div>
    <div
      class="floating-element bg-math-15 text-4xl-custom"
      style="top: 28%; left: 3%; animation-delay: 0.8s"
    >
      <i class="fas fa-calculator"></i>
    </div>
    <div
      class="floating-element bg-trophy-10 text-4xl-custom"
      style="top: 6%; left: 22%; animation-delay: 1.2s"
    >
      <i class="fas fa-trophy"></i>
    </div>
    <div
      class="floating-element bg-math-10 text-7xl-custom"
      style="top: 20%; left: 25%; animation-delay: 2s"
    >
      ?
    </div>
    <div
      class="floating-element bg-math-15 text-4xl-custom"
      style="top: 35%; left: 15%; animation-delay: 0.6s"
    >
      3
    </div>

    <div
      class="floating-element bg-math-15 text-6xl-custom"
      style="bottom: 28%; left: 2%; animation-delay: 1.5s"
    >
      −
    </div>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="bottom: 16%; left: 10%; animation-delay: 2.5s"
    >
      5
    </div>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="bottom: 4%; left: 4%"
    >
      <i class="fas fa-circle"></i>
    </div>
    <div
      class="floating-element bg-math-15 text-4xl-custom"
      style="bottom: 6%; left: 20%; animation-delay: 0.9s"
    >
      7
    </div>
    <div
      class="floating-element bg-math-10 text-4xl-custom"
      style="bottom: 38%; left: 9%; animation-delay: 1.8s"
    >
      <i class="fas fa-shapes"></i>
    </div>
    <div
      class="floating-element bg-math-15 text-5xl-custom"
      style="bottom: 22%; left: 24%; animation-delay: 3.1s"
    >
      ×
    </div>

    <div
      class="floating-element bg-math-15 text-4xl-custom"
      style="top: 4%; left: 46%; animation-delay: 1.1s"
    >
      2
    </div>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="top: 14%; left: 35%; animation-delay: 2.3s"
    >
      =
    </div>
    <div
      class="floating-element bg-math-10 text-4xl-custom"
      style="top: 12%; right: 36%; animation-delay: 0.5s"
    >
      <i
        class="fas fa-triangle-exclamation"
        style="transform: rotate(180deg)"
      ></i>
    </div>
    <div
      class="floating-element bg-math-10 text-8xl-custom"
      style="bottom: 10%; left: 40%; animation-delay: 1.6s"
    >
      ?
    </div>
    <div
      class="floating-element bg-math-15 text-4xl-custom"
      style="bottom: 4%; left: 54%; animation-delay: 0.3s"
    >
      4
    </div>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="bottom: 16%; right: 38%; animation-delay: 2.8s"
    >
      ÷
    </div>

    <div
      class="floating-element bg-trophy-10 text-5xl-custom"
      style="top: 6%; right: 5%; animation-delay: 0.7s"
    >
      <i class="fas fa-trophy"></i>
    </div>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="top: 18%; right: 14%; animation-delay: 1.3s"
    >
      6
    </div>
    <div
      class="floating-element bg-math-15 text-5xl-custom"
      style="top: 4%; right: 24%; animation-delay: 2.1s"
    >
      +
    </div>
    <div
      class="floating-element bg-math-10 text-4xl-custom"
      style="top: 28%; right: 3%; animation-delay: 0.2s"
    >
      <i class="fas fa-calculator"></i>
    </div>
    <div
      class="floating-element bg-math-10 text-6xl-custom"
      style="top: 16%; right: 25%; animation-delay: 1.9s"
    >
      ?
    </div>
    <div
      class="floating-element bg-math-15 text-5xl-custom"
      style="top: 36%; right: 14%; animation-delay: 3s"
    >
      8
    </div>

    <div
      class="floating-element bg-math-15 text-5xl-custom"
      style="bottom: 26%; right: 2%; animation-delay: 2.4s"
    >
      =
    </div>
    <div
      class="floating-element bg-math-10 text-4xl-custom"
      style="bottom: 14%; right: 12%"
    >
      <i class="fas fa-circle"></i>
    </div>
    <div
      class="floating-element bg-math-15 text-5xl-custom"
      style="bottom: 4%; right: 5%; animation-delay: 1.4s"
    >
      9
    </div>
    <div
      class="floating-element bg-math-10 text-6xl-custom"
      style="bottom: 6%; right: 22%; animation-delay: 0.8s"
    >
      −
    </div>
    <div
      class="floating-element bg-trophy-10 text-4xl-custom"
      style="bottom: 38%; right: 25%; animation-delay: 1.7s"
    >
      <i class="fas fa-trophy"></i>
    </div>
    <div
      class="floating-element bg-math-10 text-5xl-custom"
      style="bottom: 22%; right: 23%; animation-delay: 1.5s"
    >
      0
    </div>

    <div class="music-control">
      <button
        id="mBtn"
        onclick="toggleMusic()"
        class="music-btn"
        title="Kontrol Musik"
      >
        🔇
      </button>

      <span class="status-badge" id="musicStatus"> MUSIK MATI </span>
    </div>

    <audio id="bgMusic" loop>
      <source src="laguku.mp3" type="audio/mpeg" />
    </audio>

    <div class="main-container">
      <div class="header-section">
        <svg class="svg-header" viewBox="0 0 200 120">
          <rect
            x="40"
            y="40"
            width="120"
            height="60"
            rx="15"
            fill="#FFD60A"
            stroke="#2B2D42"
            stroke-width="4"
          />
          <circle cx="60" cy="70" r="10" fill="#4CC9F0" />
          <circle cx="140" cy="70" r="10" fill="#4CAF50" />
          <text
            x="90"
            y="80"
            font-family="Arial"
            font-size="40"
            font-weight="bold"
            text-anchor="middle"
            fill="#2B2D42"
          >
            +
          </text>
          <path
            d="M10 10 Q30 0 50 10 T90 10"
            stroke="#FF9F1C"
            fill="none"
            stroke-width="3"
          />
        </svg>

        <h1>Flash Card Digital</h1>
        <h1 style="color: var(--warna-oranye)">Etnomatematika Kelas 1 SD</h1>
        <p class="subtitle">Belajar Operasi Hitung dengan Budaya Sekitar</p>

        <div class="intro-text">
          Ayo belajar berhitung dengan kartu bergambar! 🌟
        </div>
      </div>

      <div class="menu-grid">
        <a href="petunjuk.html" class="menu-card petunjuk">
          <div class="icon-box">💡</div>
          <div class="menu-title">Petunjuk</div>
        </a>

        <a href="cp.html" class="menu-card capaian">
          <div class="icon-box">🏆</div>
          <div class="menu-title">Capaian Pembelajaran</div>
        </a>

        <a href="materi.html" class="menu-card materi">
          <div class="icon-box">📖</div>
          <div class="menu-title">Materi</div>
        </a>

        <a href="flashcard.html" class="menu-card flashcard">
          <div class="icon-box">🃏</div>
          <div class="menu-title">Flash Card and Quis</div>
        </a>
      </div>

      <p style="margin-top: 40px; color: #888; font-size: 0.9rem"></p>
    </div>

<script>
      const music = document.getElementById("bgMusic");
      const mBtn = document.getElementById("mBtn");
      const statusText = document.getElementById("musicStatus");

      let playing = false;

      // Fungsi pembantu untuk sinkronisasi tampilan tombol
      function updateMusicUI(isPlaying) {
        if (isPlaying) {
          mBtn.innerText = "🔊";
          statusText.innerText = "MUSIK AKTIF";
          statusText.style.color = "#1e3a8a";
        } else {
          mBtn.innerText = "🔇";
          statusText.innerText = "MUSIK MATI";
          statusText.style.color = "#c0392b";
        }
      }

      window.addEventListener("load", () => {
        // Mencoba memutar otomatis (berhasil di Chrome jika MEI tinggi)
        music.play()
          .then(() => {
            playing = true;
            updateMusicUI(true);
          })
          .catch(() => {
            // Jika diblokir (pasti terjadi di Safari), kunci status tetap MATI dengan rapi
            playing = false;
            updateMusicUI(false);
          });
      });

      function toggleMusic() {
        if (!playing) {
          music.play()
            .then(() => {
              playing = true;
              updateMusicUI(true);
            })
            .catch((err) => console.log("Gagal memutar audio:", err));
        } else {
          music.pause();
          playing = false;
          updateMusicUI(false);
        }
      }
    </script>
  </body>
</html>
