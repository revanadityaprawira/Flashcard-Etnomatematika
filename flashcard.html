<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Card Operasi Hitung Etnomatematika - Pilihan Ganda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
<style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --bg-color: #F7FFF7;
            --card-bg: #FFFFFF;
            --accent-color: #FFE66D;
            --success-color: #45B649;
            --error-color: #EE0979;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            /* MURNI MENYAMAKAN WARNA BASE DAN DOT PATTERN BG SESUAI TAHAP SEBELUMNYA */
            background-color: #e0f2fe; 
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
            color: #2D3436;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* --- LOGIKA ANIMASI MENGAPUNG SEPERTI TAHAP SEBELUMNYA --- */
        .floating-element {
            display: inline-block;
            position: absolute;
            pointer-events: none;
            user-select: none;
            animation: float 4s ease-in-out infinite;
            z-index: 1;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* KELAS WARNA RGBA IKON BACKGROUND SAMAR (OPACITY 10% - 15%) */
        .bg-math-10 { color: rgba(59, 130, 246, 0.10); }
        .bg-math-15 { color: rgba(59, 130, 246, 0.14); }
        .bg-trophy-10 { color: rgba(234, 179, 8, 0.10); }

        /* UKURAN IKON BACKGROUND */
        .text-4xl-custom { font-size: 2.25rem; }
        .text-5xl-custom { font-size: 3rem; }
        .text-6xl-custom { font-size: 3.75rem; }
        .text-7xl-custom { font-size: 4.5rem; }
        .text-8xl-custom { font-size: 6rem; }

        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
            position: relative;
            width: 100%;
            z-index: 100;
            box-sizing: border-box; /* Memastikan padding tidak merusak lebar header */
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            margin: 0;
            color: #2D3436;
            padding: 0 120px; /* Jarak aman kiri dan kanan agar teks tidak menabrak tombol */
            transition: all 0.2s ease;
        }

        .btn-home-top {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #FFD93D;
            color: #2D3436;
            border: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap; /* Teks "Beranda" dikunci agar tidak patah baris */
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 20px 20px 20px;
            position: relative;
            z-index: 10; /* Berada di atas ikon background */
        }

        .card-scene {
            width: 100%;
            max-width: 600px;
            height: 350px;
            perspective: 1000px;
            margin-bottom: 10px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 30px;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes bounce-success {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        .animate-wrong {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .animate-correct {
            animation: bounce-success 0.6s ease;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 8px solid white;
            overflow-y: auto;
        }

        .card-front {
            background: var(--card-bg);
            border: 8px solid var(--secondary-color);
        }

        .card-back {
            background: var(--secondary-color);
            color: white;
            transform: rotateY(180deg);
            justify-content: center;
            text-align: center;
        }

        .asset-image {
            width: 100%;
            max-width: 220px;
            height: 150px;
            object-fit: cover;
            margin-bottom: 15px;
            border-radius: 20px;
            background: #f0f0f0;
            border: 4px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .question-box {
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 10px;
            line-height: 1.4;
            padding: 0 10px;
        }

        .math-visual-hint {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            background: #fff9e6;
            padding: 5px 15px;
            border-radius: 12px;
            border: 2px dashed var(--accent-color);
        }

        .interaction-area {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-option {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.2s;
            color: #2D3436;
        }

        .btn-option:hover {
            border-color: var(--secondary-color);
            background: #f0fffe;
            transform: translateY(-2px);
        }

        .btn-option.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color);
        }

        .btn-option.wrong {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color);
        }

        .feedback-msg {
            min-height: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            margin-top: 10px;
            text-align: center;
            padding: 8px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            width: 100%;
        }

        .feedback-correct { background-color: #e8f5e9; color: #2e7d32; }
        .feedback-wrong { background-color: #ffebee; color: #c62828; }

        .answer-text { font-size: 4rem; font-weight: 800; }
        .explanation-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .explanation-desc { font-size: 1.1rem; opacity: 0.9; }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-nav {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .btn-prev { background: #A29BFE; color: white; }
        .btn-next { background: var(--primary-color); color: white; }

        .music-control {
            position: fixed;
            top: 75px;
            right: 20px;
            z-index: 100;
            background: white;
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-btn { border: none; background: none; cursor: pointer; }

       @media (max-width: 576px) {
            header {
                padding: 12px 10px;
                text-align: center; 
            }

            header h1 {
                font-size: 1.05rem; 

                padding-left: 95px; 
                padding-right: 95px;

                text-align: center; 
                line-height: 1.3;
                
                white-space: normal;
                word-break: break-word;
            }

            .btn-home-top {
                position: absolute;
                left: 10px; 
                top: 50%;
                transform: translateY(-50%);
                padding: 6px 10px;
                font-size: 0.75rem;
            }

            .card-scene { height: 380px; }
            .options-container { grid-template-columns: 1fr; }
            .asset-image { height: 130px; }
            .music-control { top: auto; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="floating-element bg-math-10 text-5xl-custom" style="top: 5%; left: 4%;">1</div>
    <div class="floating-element bg-math-15 text-5xl-custom" style="top: 15%; left: 12%; animation-delay: 0.4s;">+</div>
    <div class="floating-element bg-math-15 text-4xl-custom" style="top: 28%; left: 3%; animation-delay: 0.8s;"><i class="fas fa-calculator"></i></div>
    <div class="floating-element bg-trophy-10 text-4xl-custom" style="top: 6%; left: 22%; animation-delay: 1.2s;"><i class="fas fa-trophy"></i></div>
    <div class="floating-element bg-math-10 text-7xl-custom" style="top: 20%; left: 25%; animation-delay: 2s;">?</div>
    <div class="floating-element bg-math-15 text-4xl-custom" style="top: 35%; left: 15%; animation-delay: 0.6s;">3</div>

    <div class="floating-element bg-math-15 text-6xl-custom" style="bottom: 28%; left: 2%; animation-delay: 1.5s;">−</div>
    <div class="floating-element bg-math-10 text-5xl-custom" style="bottom: 16%; left: 10%; animation-delay: 2.5s;">5</div>
    <div class="floating-element bg-math-10 text-5xl-custom" style="bottom: 4%; left: 4%;"><i class="fas fa-circle"></i></div>
    <div class="floating-element bg-math-15 text-4xl-custom" style="bottom: 6%; left: 20%; animation-delay: 0.9s;">7</div>
    <div class="floating-element bg-math-10 text-4xl-custom" style="bottom: 38%; left: 9%; animation-delay: 1.8s;"><i class="fas fa-shapes"></i></div>
    <div class="floating-element bg-math-15 text-5xl-custom" style="bottom: 22%; left: 24%; animation-delay: 3.1s;">×</div>

    <div class="floating-element bg-math-15 text-4xl-custom" style="top: 4%; left: 46%; animation-delay: 1.1s;">2</div>
    <div class="floating-element bg-math-10 text-5xl-custom" style="top: 14%; left: 35%; animation-delay: 2.3s;">=</div>
    <div class="floating-element bg-math-10 text-4xl-custom" style="top: 12%; right: 36%; animation-delay: 0.5s;"><i class="fas fa-triangle-exclamation" style="transform: rotate(180deg);"></i></div>
    <div class="floating-element bg-math-10 text-8xl-custom" style="bottom: 10%; left: 40%; animation-delay: 1.6s;">?</div>
    <div class="floating-element bg-math-15 text-4xl-custom" style="bottom: 4%; left: 54%; animation-delay: 0.3s;">4</div>
    <div class="floating-element bg-math-10 text-5xl-custom" style="bottom: 16%; right: 38%; animation-delay: 2.8s;">÷</div>

    <div class="floating-element bg-trophy-10 text-5xl-custom" style="top: 6%; right: 5%; animation-delay: 0.7s;"><i class="fas fa-trophy"></i></div>
    <div class="floating-element bg-math-10 text-5xl-custom" style="top: 18%; right: 14%; animation-delay: 1.3s;">6</div>
    <div class="floating-element bg-math-15 text-5xl-custom" style="top: 4%; right: 24%; animation-delay: 2.1s;">+</div>
    <div class="floating-element bg-math-10 text-4xl-custom" style="top: 28%; right: 3%; animation-delay: 0.2s;"><i class="fas fa-calculator"></i></div>
    <div class="floating-element bg-math-10 text-6xl-custom" style="top: 16%; right: 25%; animation-delay: 1.9s;">?</div>
    <div class="floating-element bg-math-15 text-5xl-custom" style="top: 36%; right: 14%; animation-delay: 3.0s;">8</div>

    <div class="floating-element bg-math-15 text-5xl-custom" style="bottom: 26%; right: 2%; animation-delay: 2.4s;">=</div>
    <div class="floating-element bg-math-10 text-4xl-custom" style="bottom: 14%; right: 12%;"><i class="fas fa-circle"></i></div>
    <div class="floating-element bg-math-15 text-5xl-custom" style="bottom: 4%; right: 5%; animation-delay: 1.4s;">9</div>
    <div class="floating-element bg-math-10 text-6xl-custom" style="bottom: 6%; right: 22%; animation-delay: 0.8s;">−</div>
    <div class="floating-element bg-trophy-10 text-4xl-custom" style="bottom: 38%; right: 25%; animation-delay: 1.7s;"><i class="fas fa-trophy"></i></div>
    <div class="floating-element bg-math-10 text-5xl-custom" style="bottom: 22%; right: 23%; animation-delay: 1.5s;">0</div>

    <div class="music-control">
        <button onclick="toggleMusic()" class="music-btn" id="musicBtn">🔊</button>
        <span style="font-size: 0.8rem; font-weight: bold;" id="musicStatus">MUSIC AKTIF</span>
    </div>

    <audio id="bgMusic" loop autoplay>
        <source src="laguku.mp3" type="audio/mpeg">
    </audio>

    <audio id="soundCorrect">
        <source src="hore.mp3" type="audio/mpeg">
    </audio>
    <audio id="soundWrong">
        <source src="tetod.mp3" type="audio/mpeg">
    </audio>

    <header>
        <a href="awal.html" class="btn-home-top">🏠 Beranda</a>
        <h1>Belajar Hitung Etnomatematika Bali</h1>
    </header>

    <div class="game-container">
        <div id="progressText" class="mb-1 fw-bold text-secondary">Kartu 1 dari 10</div>

        <div class="card-scene">
            <div class="card-inner" id="flashCard">
                <div class="card-face card-front">
                    <img id="cardImage" src="" alt="Etnomatematika" class="asset-image">
                    <div class="question-box" id="storyText">Loading soal...</div>
                    <div class="math-visual-hint" id="visualHint">0 + 0</div>
                </div>

                <div class="card-face card-back">
                    <div class="explanation-title">JAWABAN BENAR!</div>
                    <div class="answer-text" id="answerDisplay">0</div>
                    <div class="explanation-desc" id="explanationText">Hebat! Kamu mengerti konsepnya.</div>
                    <div class="mt-4">
                        <button class="btn btn-light fw-bold rounded-pill px-4" onclick="flipCard()">Kembali ke Soal</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="interaction-area">
            <div class="options-container" id="optionsContainer"></div>
            
            <div id="feedback" class="feedback-msg">
                Pilih satu jawaban di atas!
            </div>
            
            <small class="text-muted mt-0">Ketuk pilihanmu untuk mengecek!</small>
        </div>

        <div class="controls">
            <button id="btnPrev" class="btn-nav btn-prev" onclick="changeCard(-1)">⬅ Sebelumnya</button>
            <button id="btnNext" class="btn-nav btn-next" onclick="changeCard(1)">Selanjutnya ➡</button>
        </div>
    </div>

    <script>
        
        const cardData = [
            {
                story: "Ibu memiliki 4 buah tipat di piring. Kemudian Ibu menambah lagi 2 tipat. Berapa jumlah tipat sekarang? 🥟",
                hint: "4 + 2",
                answer: 6,
                options: [4, 6, 8, 10],
                img: "tipat.jpg",
                correctMsg: "Hebat! 4 ditambah 2 hasilnya adalah 6.",
                wrongMsg: "Coba hitung lagi, 4 di kepala, lalu hitung maju 2 langkah!"
            },
            {
                story: "Putu membawa 5 tusuk sate lilit. Ternyata adiknya membawa 3 tusuk lagi. Berapa total sate mereka? 🍢",
                hint: "5 + 3",
                answer: 8,
                options: [6, 7, 8, 9],
                img: "satelilit.jpg",
                correctMsg: "Luar biasa! 5 tusuk ditambah 3 tusuk jadi 8 tusuk sate.",
                wrongMsg: "Kurang tepat. Coba gunakan jarimu untuk menghitung 5 tambah 3."
            },
            {
                story: "Bapak punya 10 potong bambu untuk membuat Klakat. Sebanyak 3 potong sudah dipakai. Berapa sisa bambu Bapak? 🎋",
                hint: "10 - 3",
                answer: 7,
                options: [5, 6, 7, 8],
                img: "klakat.jpg",
                correctMsg: "Tepat sekali! 10 dikurangi 3 sisa bambunya adalah 7.",
                wrongMsg: "Masih kurang. Hitung mundur 3 langkah dari angka 10 ya."
            },
            {
                story: "Ada 3 tumpuk canang di meja. Setiap tumpuk isinya 2 canang. Berapa jumlah semua canang? 🌸",
                hint: "2 + 2 + 2",
                answer: 6,
                options: [4, 5, 6, 7],
                img: "canang.jpg",
                correctMsg: "Pintar! 2 ditambah sebanyak 3 kali hasilnya adalah 6.",
                wrongMsg: "Coba hitung pelan-pelan: 2, 4, lalu...?"
            },
            {
                story: "Di meja ada 8 tipat. Made memakan 5 tipat karena lapar. Berapa sisa tipat di meja? 🥟",
                hint: "8 - 5",
                answer: 3,
                options: [2, 3, 4, 5],
                img: "tipat2.jpg",
                correctMsg: "Benar! 8 dikurangi 5 hasilnya adalah 3.",
                wrongMsg: "Hitung mundur ya, 8 dikurang 5 bukan itu hasilnya."
            },
            {
                story: "Komang membuat 5 tusuk sate ayam dan 5 tusuk sate sapi. Berapa jumlah semua sate Komang? 🍡",
                hint: "5 + 5",
                answer: 10,
                options: [8, 9, 10, 11],
                img: "sate2.jpg",
                correctMsg: "Wow, teliti sekali! 5 ditambah 5 memang hasilnya 10.",
                wrongMsg: "Hampir benar! Ingat, jari tangan kanan dan kirimu kalau digabung jadi berapa?"
            },
            {
                story: "Bapak punya 4 potong bambu Klakat, lalu memotong lagi 4 bambu. Berapa bambu Bapak sekarang? 🎋",
                hint: "4 + 4",
                answer: 8,
                options: [6, 7, 8, 9],
                img: "bambu.jpg",
                correctMsg: "Sempurna! 4 ditambah 4 hasilnya adalah 8.",
                wrongMsg: "Masih salah. Coba hitung 4 + 4 sekali lagi."
            },
            {
                story: "Ada 9 canang untuk banten. Sebanyak 6 canang sudah diletakkan. Berapa canang yang tersisa? 🌸",
                hint: "9 - 6",
                answer: 3,
                options: [2, 3, 4, 5],
                img: "banten.jpg",
                correctMsg: "Benar! 9 dikurangi 6 sisanya adalah 3.",
                wrongMsg: "Bukan itu. Coba hitung selisih antara 9 dan 6!"
            },
            {
                story: "Wayan makan 2 tusuk sate. Lalu ia makan lagi 2, makan lagi 2, dan makan lagi 2. Berapa total sate yang dimakan? 🍢",
                hint: "2 + 2 + 2 + 2",
                answer: 8,
                options: [6, 7, 8, 9],
                img: "sate3.jpg",
                correctMsg: "Tepat! Kamu menjumlahkan angka 2 sebanyak 4 kali dan hasilnya 8.",
                wrongMsg: "Belum tepat. Coba hitung loncat dua-dua sebanyak empat kali!"
            },
            {
                story: "Ada 10 canang di nampan. Kakak mengambil 1 canang untuk sembahyang. Berapa sisanya? 🌸",
                hint: "10 - 1",
                answer: 9,
                options: [7, 8, 9, 10],
                img: "canang2.jpg",
                correctMsg: "Benar sekali! 10 dikurangi 1 adalah 9.",
                wrongMsg: "Coba ingat angka sebelum 10 itu angka recovers?"
            }
        ];

        let currentIndex = 0;
        let isAnswered = false;
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicStatus = document.getElementById('musicStatus');

        let musicPlaying = true;

        window.addEventListener('load', () => {
            music.volume = 0.5;

            music.play().then(() => {
                musicBtn.innerText = "🔊";
                musicStatus.innerText = "MUSIK AKTIF";
            }).catch(() => {
                musicBtn.innerText = "🔇";
                musicStatus.innerText = "MUSIK MATI";
                musicPlaying = false;
            });

            renderCard();
        });

        function toggleMusic() {
            if (musicPlaying) {
                music.pause();
                musicBtn.innerText = "🔇";
                musicStatus.innerText = "MUSIC MATI";
            } else {
                music.play();
                musicBtn.innerText = "🔊";
                musicStatus.innerText = "MUSIC AKTIF";
            }

            musicPlaying = !musicPlaying;
        }

        function renderCard() {
            const data = cardData[currentIndex];
            const card = document.getElementById('flashCard');
            
            card.classList.remove('animate-wrong', 'animate-correct');
            
            document.getElementById('storyText').innerText = data.story;
            document.getElementById('visualHint').innerText = data.hint;
            document.getElementById('answerDisplay').innerText = data.answer;
            document.getElementById('explanationText').innerText = data.correctMsg;
            document.getElementById('progressText').innerText = `Kartu ${currentIndex + 1} dari ${cardData.length}`;
            
            const feedback = document.getElementById('feedback');
            feedback.innerText = 'Ayo pilih jawabanmu!';
            feedback.className = 'feedback-msg';
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const labels = ['A', 'B', 'C', 'D'];
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerHTML = `<strong>${labels[idx]}.</strong> ${opt}`;
                btn.onclick = () => selectOption(opt, data.answer, btn, data);
                optionsContainer.appendChild(btn);
            });

            const imgEl = document.getElementById('cardImage');
            imgEl.src = data.img; 
            imgEl.onerror = function() {
                this.src = "https://via.placeholder.com/400x300?text=Gambar+Aset+" + (currentIndex + 1);
            };

            // --- LOGIKA KONTROL TOMBOL NAVIGASI ---
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');

            // 1. Jika di kartu pertama, sembunyikan tombol 'Sebelumnya'
            if (currentIndex === 0) {
                btnPrev.style.display = 'none';
            } else {
                btnPrev.style.display = 'inline-block';
            }

            // 2. Jika di kartu terakhir (nomor 10) ganti teks, warna hijau, dan aksi ke awal.html
            if (currentIndex === cardData.length - 1) {
                btnNext.innerText = 'Selesai 🏁';
                btnNext.style.backgroundColor = 'var(--success-color)';
                btnNext.onclick = function() {
                    window.location.href = 'awal.html';
                };
            } else {
                btnNext.innerText = 'Selanjutnya ➡';
                btnNext.style.backgroundColor = 'var(--primary-color)';
                btnNext.onclick = function() {
                    changeCard(1);
                };
            }

            isAnswered = false;
            card.classList.remove('is-flipped');
        }

        function selectOption(selected, correct, btn, data) {
            if(isAnswered) return;

            const feedback = document.getElementById('feedback');
            const card = document.getElementById('flashCard');
            
            const soundCorrect = document.getElementById('soundCorrect');
            const soundWrong = document.getElementById('soundWrong');

            card.classList.remove('animate-wrong', 'animate-correct');
            void card.offsetWidth; 

            if (selected == correct) {
                btn.classList.add('correct');
                card.classList.add('animate-correct');
                feedback.innerText = "✨ " + data.correctMsg;
                feedback.className = 'feedback-msg feedback-correct';
                isAnswered = true;

                soundCorrect.currentTime = 0;
                soundCorrect.play().catch(e => console.log("Gagal memutar suara benar:", e));

                setTimeout(() => {
                    flipCard();
                }, 1500);
            } else {
                btn.classList.add('wrong');
                card.classList.add('animate-wrong');
                feedback.innerText = "❌ " + data.wrongMsg;
                feedback.className = 'feedback-msg feedback-wrong';
                
                soundWrong.currentTime = 0;
                soundWrong.play().catch(e => console.log("Gagal memutar suara salah:", e));
                
                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 1500);
            }
        }

        function flipCard() {
            if (!isAnswered && !document.getElementById('flashCard').classList.contains('is-flipped')) {
                const feedback = document.getElementById('feedback');
                feedback.innerText = "Kamu harus menjawab dengan benar dulu!";
                feedback.className = 'feedback-msg feedback-wrong';
                return;
            }
            document.getElementById('flashCard').classList.toggle('is-flipped');
        }

        function changeCard(dir) {
            currentIndex += dir;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= cardData.length) currentIndex = cardData.length - 1;
            renderCard();
        }

    </script>
</body>
</html>
